# =============================================
# SPRING BOOT CONFIGURATION - Book Author App
# =============================================

# Server Configuration
server.port=8080

# JSP View Resolver Configuration
# These settings tell Spring where to find JSP files
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# =============================================
# H2 DATABASE CONFIGURATION
# =============================================
# Using in-memory H2 database (no external DB needed)
spring.datasource.url=jdbc:h2:mem:bookauthordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console (access at: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL Initialization - Run data.sql on startup
spring.sql.init.mode=always
